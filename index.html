<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL LUZ FEC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    <main class="container">
        <header>
            <h1>SENTINEL <span>LUZ FEC</span></h1>
            <p>Sistema de Verificación Estudiantil</p>
        </header>
        <nav class="tabs">
            <button class="tab-btn active" data-target="registro">Registro</button>
            <button class="tab-btn" data-target="escaner">Escáner</button>
        </nav>
        <!-- Sección de Registro -->
        <section id="registro" class="tab-content active">
            <div class="glass-card">
                <h2>Nuevo Estudiante</h2>
                <form id="registroForm">
                    <div class="input-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" required placeholder="Ej. Juan">
                    </div>
                    <div class="input-group">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" required placeholder="Ej. Pérez">
                    </div>
                    <div class="input-group">
                        <label for="cedula">Cédula de Identidad</label>
                        <input type="number" id="cedula" required placeholder="Ej. 12345678">
                    </div>
                    <div class="input-group">
                        <label for="carrera">Carrera Universitaria</label>
                        <select id="carrera" required>
                            <option value="" disabled selected>Seleccione una carrera...</option>
                            <option value="Física">Física</option>
                            <option value="Biología">Biología</option>
                            <option value="Matemáticas">Matemáticas</option>
                            <option value="Antropología">Antropología</option>
                            <option value="Computación">Computación</option>
                            <option value="Química">Química</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Generar Código QR</button>
                </form>
                <div id="qrResult" class="hidden">
                    <h3>Tu Código de Acceso</h3>
                    <div class="qr-container" id="qrcode"></div>
                    <p class="qr-hint">Guarda este código para tu acceso</p>
                                       <button type="button" id="printQrBtn" class="btn-secondary" style="margin-top: 1rem;">🖨️ Imprimir Código QR</button>
                </div>
            </div>
        </section>
        <!-- Sección de Escáner -->
        <section id="escaner" class="tab-content">
            <div class="glass-card">
                <h2>Verificación de Acceso</h2>
                <div id="reader-container">
                    <div id="reader"></div>
                </div>
                <button id="startScanBtn" class="btn-secondary">Iniciar Cámara</button>
                <button id="stopScanBtn" class="btn-danger hidden">Detener Cámara</button>
                <!-- Resultados del Escáner -->
                <div id="scanResult" class="hidden"></div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
